<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<title>Braille Converter</title>
		<style>
			:root {
				--primary: #005dac;
				--on-primary: #ffffff;
				--hover: #00539a;
				--background: #f9f9ff;
				--surface: #ffffff;
				--text: #181c21;
				--border: #c1c6d4;
				--muted: #f2f3fc;
				--success: #0b6b1d;
				--on-success: #ffffff;
				--danger: #ba1a1a;
				--on-danger: #ffffff;
				--highlight-bg: #d4e3ff;
			}

			@media (prefers-color-scheme: dark) {
				:root:not(.light) {
					--primary: #a5c8ff;
					--on-primary: #00315f;
					--hover: #72adff;
					--background: #101319;
					--surface: #0b0e14;
					--text: #e0e2ea;
					--border: #414752;
					--muted: #181c21;
					--success: #82db7e;
					--on-success: #00390a;
					--danger: #ffb4ab;
					--on-danger: #93000a;
					--highlight-bg: #001c3a;
				}
			}

			:root.dark {
				--primary: #a5c8ff;
				--on-primary: #00315f;
				--hover: #72adff;
				--background: #101319;
				--surface: #0b0e14;
				--text: #e0e2ea;
				--border: #414752;
				--muted: #181c21;
				--success: #82db7e;
				--on-success: #00390a;
				--danger: #ffb4ab;
				--on-danger: #93000a;
				--highlight-bg: #001c3a;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				outline-offset: 2px;
			}

			*:focus-visible {
				outline: 2px solid var(--primary);
			}

			body {
				background: var(--background);
				color: var(--text);
				font-family: sans-serif;
				display: flex;
				justify-content: center;
				min-height: 100vh;
				padding: 1rem;
			}

			.container {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 8px;
				max-width: 1100px;
				padding: 2rem;
				width: 100%;
				position: relative;
				margin: 2rem 0;
			}

			.main-layout {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 1.5rem;
				margin-top: 1.5rem;
			}

			.panel {
				display: flex;
				flex-direction: column;
				gap: 1rem;
				padding: 1.2rem;
				border: 1px solid var(--border);
				border-radius: 8px;
				background: var(--surface);
			}

			.output-panel {
				background: var(--muted);
			}

			.panel-header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				border-bottom: 1px solid var(--border);
				padding-bottom: .6rem;
				margin-bottom: .4rem;
			}

			.panel-title {
				font-weight: 700;
				font-size: .9rem;
				text-transform: uppercase;
				color: var(--primary);
			}

			.swap-btn {
				background: none;
				border: 1px solid var(--border);
				border-radius: 50%;
				width: 36px;
				height: 36px;
				display: flex;
				align-items: center;
				justify-content: center;
				cursor: pointer;
				transition: background .2s;
				padding: 0;
			}

			.swap-btn:hover {
				background: var(--muted);
			}

			.swap-btn svg {
				width: 20px;
				height: 20px;
				fill: var(--text);
			}


			.clear-btn-small {
				width: auto;
				padding: .2rem .6rem;
			}
			.main-textarea {
				border: 0;
				padding: 0;
				min-height: 150px;
				outline: none;
				box-shadow: none;
			}
			.convert-btn-large {
				padding: .45rem 1.4rem;
				font-size: 1rem;
			}
			.no-margin {
				margin: 0;
			}
			.mt-auto {
				margin-top: auto;
			}
			.out-label-small {
				margin: 0;
				font-size: .85rem;
				opacity: .8;
			}
			.copy-btn-small {
				padding: .2rem .5rem;
				font-size: .75rem;
			}
			.out-box-minimal {
				background: transparent;
				border: 0;
				padding: .5rem 0;
				min-height: 30px;
			}
			.visual-toggle {
				font-weight: normal;
				display: flex;
				align-items: center;
				gap: 6px;
				cursor: pointer;
				margin: 0;
				font-size: .75rem;
			}
			.visual-box {
				display: none;
				min-height: 72px;
				background: var(--surface);
				margin-top: .5rem;
			}

			.hidden {
				display: none !important;
			}

			h1, h2, h3 {
				margin: .5rem 0;
			}

			label {
				display: block;
				font-weight: 700;
				margin: .4rem 0 .2rem;
			}

			input, select, button, textarea {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 4px;
				color: var(--text);
				font-size: 1rem;
				padding: .5rem;
				width: 100%;
			}

			textarea {
				resize: vertical;
				min-height: 80px;
			}

			button {
				cursor: pointer;
			}

			button:disabled {
				opacity: .6;
				cursor: not-allowed;
			}

			.primary {
				background: var(--primary);
				color: var(--on-primary);
				border: 0;
			}

			.primary:hover:not(:disabled) {
				background: var(--hover);
			}

			.secondary:hover:not(:disabled) {
				background: var(--muted);
			}

			.danger {
				background: var(--danger);
				color: var(--on-danger);
				border: 0;
			}

			.success {
				background: var(--success);
				color: var(--on-success);
				border: 0;
			}

			.selectors {
				position: absolute;
				right: 2rem;
				top: 1rem;
				display: flex;
				gap: 8px;
			}

			.selectors select {
				width: auto;
				font-size: .9rem;
			}

			.row {
				display: flex;
				gap: 1rem;
				margin-bottom: 1rem;
			}

			.group {
				flex: 1;
			}

			.error {
				color: var(--danger);
				font-size: .9rem;
				margin: 1rem 0;
				display: block;
				font-weight: 500;
			}

			.info {
				font-size: .9rem;
				opacity: .8;
				line-height: 1.6;
			}

			@media(max-width: 768px) {
				.selectors {
					position: static;
					justify-content: end;
					margin-bottom: .5rem;
				}

				.row {
					flex-direction: column;
				}

				.main-layout {
					grid-template-columns: 1fr;
				}
			}

			.seg {
				margin: 1.2rem 0 0;
			}

			.inline-label {
				font-weight: 700;
				display: inline;
				margin: 0;
			}

			.option-row {
				display: flex;
				gap: 12px;
				flex-wrap: wrap;
				align-items: center;
				margin: .6rem 0;
			}

			.radio-wrap {
				display: flex;
				gap: 4px;
				align-items: center;
			}

			.radio-wrap input[type=radio] {
				width: auto;
				cursor: pointer;
			}

			.radio-wrap label {
				font-weight: normal;
				margin: 0;
				cursor: pointer;
			}

			.tag {
				font-size: .75rem;
				padding: .15rem .5rem;
				border-radius: 12px;
				background: var(--highlight-bg);
				color: var(--primary);
				font-weight: 700;
				white-space: nowrap;
			}

			.btn-sm {
				width: auto;
				padding: .3rem .9rem;
				font-size: .85rem;
			}

			.btn-row {
				display: flex;
				gap: 8px;
				margin-top: .7rem;
				align-items: center;
			}

			.caption {
				font-size: .8rem;
				opacity: .7;
				margin-top: .25rem;
				line-height: 1.5;
			}

			.out-header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: .3rem;
			}

			.out-box {
				background: var(--muted);
				border: 1px solid var(--border);
				border-radius: 4px;
				padding: .8rem 1rem;
				min-height: 54px;
				word-break: break-all;
			}

			.braille-unicode {
				font-size: 1.9rem;
				letter-spacing: 5px;
				line-height: 2.2;
			}

			.dots-mono {
				font-family: monospace;
				font-size: .9rem;
				line-height: 1.8;
			}

			.decoded-text {
				font-size: 1.1rem;
				line-height: 1.8;
			}

			.placeholder-text {
				opacity: .45;
				font-style: italic;
				font-size: .9rem;
			}

			.cells-wrap {
				display: flex;
				flex-wrap: wrap;
				gap: 7px;
				padding: .8rem;
				align-items: flex-end;
			}

			.cell-item {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 2px;
			}

			.cell-grid {
				display: grid;
				grid-template-columns: 1fr 1fr;
				grid-template-rows: 1fr 1fr 1fr;
				gap: 3px;
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 3px;
				padding: 4px;
			}

			.cdot {
				width: 9px;
				height: 9px;
				border-radius: 50%;
				background: var(--border);
			}

			.cdot.on {
				background: var(--primary);
			}

			.cell-lbl {
				font-size: .62rem;
				opacity: .75;
				max-width: 30px;
				text-align: center;
				overflow: hidden;
				white-space: nowrap;
				line-height: 1.3;
			}

			.cell-spacer {
				width: 10px;
			}

			.divider {
				border: 0;
				border-top: 1px solid var(--border);
				margin: 1.2rem 0 .8rem;
			}

			select#script {
				width: auto;
				min-width: 200px;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="selectors">
				<select id="language">
					<option value="en">English</option>
					<option value="id">Bahasa Indonesia</option>
				</select>
				<select id="theme">
					<option value="auto">Auto</option>
					<option value="light">Light</option>
					<option value="dark">Dark</option>
				</select>
			</div>
			<h1 id="title"></h1>
			<p id="subtitle" class="info" style="margin-top:.25rem"></p>
			<div class="seg">
				<div class="option-row">
					<label class="inline-label" id="scriptLabel" for="script"></label>
					<select id="script">
						<option value="en">English</option>
						<option value="nl">Nederlands (Dutch)</option>
						<option value="fr">Français (French)</option>
						<option value="de">Deutsch (German)</option>
						<option value="es">Español (Spanish)</option>
						<option value="pt">Português (Portuguese)</option>
						<option value="it">Italiano (Italian)</option>
						<option value="id2">Indonesian / Malay</option>
						<option value="vi">Tiếng Việt (Vietnamese)</option>
						<option value="sq">Shqip (Albanian)</option>
						<option value="cs">Čeština (Czech)</option>
						<option value="hu">Magyar (Hungarian)</option>
						<option value="pl">Polski (Polish)</option>
						<option value="ro">Română (Romanian)</option>
						<option value="sk">Slovenčina (Slovak)</option>
						<option value="sv">Svenska (Swedish)</option>
						<option value="da">Dansk (Danish)</option>
						<option value="ga">Gaeilge (Irish)</option>
						<option value="cy">Cymraeg (Welsh)</option>
						<option value="no">Norsk (Norwegian)</option>
						<option value="fi">Suomi (Finnish)</option>
						<option value="is">Íslenska (Icelandic)</option>
						<option value="tr">Türkçe (Turkish)</option>
						<option value="uk">Українська (Ukrainian)</option>
						<option value="bg">Български (Bulgarian)</option>
						<option value="be">Беларуская (Belarusian)</option>
						<option value="ru">Русский (Russian)</option>
						<option value="el">Ελληνικά (Greek)</option>
						<option value="he">עברית (Hebrew)</option>
						<option value="hy">Հայերեն (Armenian)</option>
						<option value="ka">ქართული (Georgian)</option>
						<option value="ar">العربية (Arabic)</option>
						<option value="fa">فارسی (Persian)</option>
						<option value="ur_pk">Urdu (Pakistan)</option>
						<option value="ur_in">Urdu (India)</option>
						<option value="hi">हिन्दी (Hindi)</option>
						<option value="bn">বাংলা (Bengali)</option>
						<option value="pa">ਪੰਜਾਬੀ (Punjabi)</option>
						<option value="gu">ગુજરાતી (Gujarati)</option>
						<option value="or">ଓଡ଼ିଆ (Odia)</option>
						<option value="ta">தமிழ் (Tamil)</option>
						<option value="te">తెలుగు (Telugu)</option>
						<option value="kn">ಕನ್ನಡ (Kannada)</option>
						<option value="ml">മലയാളം (Malayalam)</option>
					</select>
					<span class="tag" id="gradeTag"></span>
				</div>
				<div class="option-row" style="margin-top:.5rem">
					<label class="inline-label" id="dirLabel"></label>
					<div class="radio-wrap">
						<input type="radio" name="dir" id="dirTBr" value="tb" checked>
						<label for="dirTBr" id="dirTB"></label>
					</div>
					<button class="swap-btn" id="swapBtn" type="button" title="Swap languages">
						<svg viewBox="0 0 24 24"><path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"/></svg>
					</button>
					<div class="radio-wrap">
						<input type="radio" name="dir" id="dirBTr" value="bt">
						<label for="dirBTr" id="dirBT"></label>
					</div>
					<div class="radio-wrap">
						<input type="radio" name="dir" id="dirDr" value="dots">
						<label for="dirDr" id="dirDots"></label>
					</div>
				</div>
			</div>

			<div class="main-layout">
				<div class="panel input-panel">
					<div class="panel-header">
						<span class="panel-title" id="inputPanelTitle"></span>
					</div>
					<div class="seg no-margin" >
						<label id="inputLabel" for="inputArea" class="hidden"></label>
						<textarea id="inputArea" rows="8" spellcheck="false" class="main-textarea"></textarea>
						<div id="inputCaption" class="caption"></div>
					</div>
					<div class="btn-row mt-auto" >
						<button class="secondary btn-sm convert-btn-large" id="clearBtn"></button>
					</div>
				</div>

				<div class="panel output-panel">
					<div class="panel-header">
						<span class="panel-title" id="outputPanelTitle"></span>
					</div>
					<div id="outputSection" class="no-margin" style="display:flex;flex-direction:column;gap:1rem">
						<div id="unicodeSection" class="seg no-margin" >
							<div class="out-header">
								<label id="unicodeLabel" class="out-label-small"></label>
								<button class="secondary btn-sm copy-btn-small" id="copyUnicode" ></button>
							</div>
							<div class="out-box braille-unicode out-box-minimal" id="unicodeOutput" >
								<span class="placeholder-text" id="placeholderUni"></span>
							</div>
						</div>
						<div id="dotsSection" class="seg no-margin" >
							<div class="out-header">
								<label id="dotsLabel" class="out-label-small"></label>
								<button class="secondary btn-sm copy-btn-small" id="copyDots" ></button>
							</div>
							<div class="out-box dots-mono out-box-minimal" id="dotsOutput" >
								<span class="placeholder-text" id="placeholderDots"></span>
							</div>
						</div>
						<div id="textSection" class="seg no-margin" >
							<div class="out-header">
								<label id="textOutLabel" class="out-label-small"></label>
								<button class="secondary btn-sm copy-btn-small" id="copyText" ></button>
							</div>
							<div class="out-box decoded-text out-box-minimal" id="textOutput" >
								<span class="placeholder-text" id="placeholderText"></span>
							</div>
						</div>
						<div class="seg no-margin" >
							<div style="display:flex;justify-content:space-between;align-items:center">
								<label id="visualLabel" class="out-label-small"></label>
								<label class="visual-toggle">
									<input type="checkbox" id="showVisual" style="width:auto">
									<span id="showVisualLabel"></span>
								</label>
							</div>
							<div class="out-box cells-wrap visual-box" id="visualOutput" ></div>
						</div>
					</div>
				</div>
			</div>
			<p class="info" style="margin-top:1.5rem;border-top:1px solid var(--border);padding-top:.8rem" id="footNote"></p>
		</div>
		<script>
			const text = {
				en: {
					title: 'Braille Converter',
					subtitle: 'Convert text to Braille (Unicode or dot notation) and vice versa. Supports over 40 languages and scripts including English, Dutch, French, German, Spanish, Portuguese, Italian, Indonesian, Vietnamese, Greek, Russian, Arabic, Hebrew, Hindi, and many more.',
					scriptLabel: 'Script:',
					gradeTag: 'Grade 1 · Uncontracted',
					dirLabel: 'Mode:',
					dirTB: 'Text → Braille',
					dirBT: 'Braille → Text',
					dirDots: 'Dot Numbers → Braille / Text',
					inputLabel: 'Input',
					clearBtn: 'Clear',
					unicodeLabel: 'Braille Unicode',
					dotsLabel: 'Dot Notation',
					textOutLabel: 'Decoded Text',
					visualLabel: 'Visual Cells',
					showVisualLabel: 'Show visual cells',
					copyBtn: 'Copy',
					copiedBtn: 'Copied ✓',
					placeholder: '—',
					footNote: 'Grade 1 (uncontracted) braille only. Capitals are prefixed with the capital sign ⠠ (dot 6). Numbers are prefixed with the number sign ⠼ (dots 3-4-5-6). Dot notation format: space-separated cells, each cell listed as its raised dot numbers (e.g. 125 for ⠓ h); use 0 for a blank/space cell. Supports Eastern Arabic and Persian digits. Vietnamese tone marks are supported as vowel prefixes. For RTL scripts like Arabic and Hebrew, Braille remains left-to-right.',
					captionTB: 'Enter plain text. Capitals are handled automatically.',
					captionBT: 'Paste Braille Unicode characters (e.g. ⠓⠑⠇⠇⠕).',
					captionDots: 'Enter space-separated dot cells. Use digit strings per cell (e.g. "125 15 123 123 135"), and 0 for blank. Optionally prefix cap sign: "6 125 = ⠠H".',
					autoTheme: 'Auto',
					lightTheme: 'Light',
					darkTheme: 'Dark',
				},
				id: {
					title: 'Konverter Braille',
					subtitle: 'Konversi teks ke Braille (Unicode atau notasi titik) dan sebaliknya. Mendukung lebih dari 40 bahasa dan aksara termasuk Inggris, Belanda, Prancis, Jerman, Spanyol, Portugis, Italia, Indonesia, Vietnam, Yunani, Rusia, Arab, Ibrani, Hindi, dan banyak lagi.',
					scriptLabel: 'Aksara:',
					gradeTag: 'Kelas 1 · Tidak Disingkat',
					dirLabel: 'Mode:',
					dirTB: 'Teks → Braille',
					dirBT: 'Braille → Teks',
					dirDots: 'Nomor Titik → Braille / Teks',
					inputLabel: 'Masukan',
					clearBtn: 'Hapus',
					unicodeLabel: 'Braille Unicode',
					dotsLabel: 'Notasi Titik',
					textOutLabel: 'Teks Terdekode',
					visualLabel: 'Sel Visual',
					showVisualLabel: 'Tampilkan sel visual',
					copyBtn: 'Salin',
					copiedBtn: 'Disalin ✓',
					placeholder: '—',
					footNote: 'Hanya braille kelas 1 (tidak disingkat). Huruf kapital diawali tanda kapital ⠠ (titik 6). Angka diawali tanda angka ⠼ (titik 3-4-5-6). Format notasi titik: sel dipisah spasi, tiap sel adalah string angka titik yang raised (mis. 125 untuk ⠓ h); gunakan 0 untuk sel kosong/spasi. Mendukung angka Arab Timur dan Persia. Tanda nada Vietnam didukung sebagai prefiks vokal. Untuk aksara kanan-ke-kiri seperti Arab dan Ibrani, Braille tetap dibaca kiri-ke-kanan.',
					captionTB: 'Masukkan teks biasa. Huruf kapital ditangani otomatis.',
					captionBT: 'Tempel karakter Braille Unicode (mis. ⠓⠑⠇⠇⠕).',
					captionDots: 'Masukkan sel titik dipisah spasi. Gunakan string digit per sel (mis. "125 15 123 123 135"), dan 0 untuk kosong.',
					autoTheme: 'Otomatis',
					lightTheme: 'Terang',
					darkTheme: 'Gelap',
					inputPanelTitle: 'Sumber',
					outputPanelTitle: 'Terjemahan',
				}
			};

			text.en.inputPanelTitle = 'Source';
			text.en.outputPanelTitle = 'Translation';

			const d = (...dots)=>String.fromCharCode(0x2800 + dots.reduce((s,x)=>s + (1 << (x - 1)), 0));

			const BLANK = '\u2800';
			const NUM_SIGN = d(3, 4, 5, 6);
			const CAP_SIGN = d(6);

			function charToDots(ch) {
				const n = ch.charCodeAt(0) - 0x2800;
				if (n < 0 || n > 63)
					return [];
				return [1, 2, 3, 4, 5, 6].filter(b=>n & (1 << (b - 1)));
			}

			const BASE = {
				a: d(1),
				b: d(1, 2),
				c: d(1, 4),
				d: d(1, 4, 5),
				e: d(1, 5),
				f: d(1, 2, 4),
				g: d(1, 2, 4, 5),

						'ڑ': d(1, 2, 4, 5, 6), 'ز': d(1, 3, 5, 6), 'ژ': d(2, 4, 5, 6), 'س': d(2, 3, 4),
						'ش': d(1, 4, 6), 'ص': d(1, 2, 3, 4, 6), 'ض': d(2, 3, 4, 6), 'ط': d(2, 3, 4, 5, 6),
						'ظ': d(1, 2, 3, 4, 5, 6), 'ع': d(1, 2, 3, 5, 6), 'غ': d(1, 2, 6), 'ف': d(1, 2, 4),
						'ق': d(1, 2, 3, 4, 5), 'ک': d(1, 3), 'گ': d(1, 2, 4, 5), 'ل': d(1, 2, 3), 'م': d(1, 3, 4),
						'ن': d(1, 3, 4, 5), 'ں': d(5, 6), 'و': d(1, 2, 3, 6), 'ہ': d(1, 2, 5), 'ھ': d(4, 5),
						'ی': d(2, 4), 'ے': d(1, 5)
					}
				}
			};

			function buildRevMap(scriptKey) {
				const letters = (SCRIPTS[scriptKey] || SCRIPTS.en).letters;
				const revLetters = {}
				  , revDigits = {}
				  , revPunct = {};
				for (const [k,v] of Object.entries(letters))
					revLetters[v] = k;
				for (const [k,v] of Object.entries(DIGITS))
					revDigits[v] = k;
				for (const [k,v] of Object.entries(PUNCT))
					revPunct[v] = k;
				return {
					revLetters,
					revDigits,
					revPunct
				};
			}

			function textToBraille(text, scriptKey) {
				const letters = (SCRIPTS[scriptKey] || SCRIPTS.en).letters;
				const sortedKeys = Object.keys(letters).sort((a,b)=>b.length - a.length);
				const cells = [];
				let inNum = false;
				let i = 0;

				while (i < text.length) {
					const ch = text[i];
					if (ch === '\n' || ch === '\r') {
						inNum = false;
						cells.push({
							braille: BLANK,
							source: '↵',
							isSpace: true
						});
						i++;
						continue;
					}
					if (ch === ' ' || ch === '\t') {
						inNum = false;
						cells.push({
							braille: BLANK,
							source: ' ',
							isSpace: true
						});
						i++;
						continue;
					}

					if (DIGITS[ch]) {
						if (!inNum) {
							cells.push({
								braille: NUM_SIGN,
								source: '⠼',
								isPrefix: true
							});
							inNum = true;
						}
						cells.push({
							braille: DIGITS[ch],
							source: ch
						});
						i++;
						continue;
					}
					inNum = false;

					let found = false;
					for (const key of sortedKeys) {
						if (text.toLowerCase().startsWith(key, i)) {
							const source = text.substring(i, i + key.length);
							const isUpper = source !== key;

							if (isUpper) {
								cells.push({
									braille: CAP_SIGN,
									source: '⠠',
									isPrefix: true
								});
							}

							const brailleStr = letters[key];
							for (const b of brailleStr) {
								cells.push({
									braille: b,
									source: key.length === 1 ? key : source
								});
							}
							i += key.length;
							found = true;
							break;
						}
					}

					if (found)
						continue;

					if (PUNCT[ch]) {
						cells.push({
							braille: PUNCT[ch],
							source: ch
						});
						i++;
						continue;
					}
					i++;
				}
				return cells;
			}

			function brailleToText(input, scriptKey) {
				const {revLetters, revDigits, revPunct} = buildRevMap(scriptKey);
				let result = '';
				let capNext = false
				  , inNum = false;

				for (const ch of input) {
					if (ch === ' ' || ch === BLANK) {
						result += ' ';
						inNum = false;
						continue;
					}
					if (ch === CAP_SIGN) {
						capNext = true;
						continue;
					}
					if (ch === NUM_SIGN) {
						inNum = true;
						continue;
					}

					if (inNum) {
						const digit = revDigits[ch];
						if (digit !== undefined) {
							result += digit;
							continue;
						}
						inNum = false;
					}

					const letter = revLetters[ch];
					if (letter !== undefined) {
						result += capNext ? letter.toUpperCase() : letter;
						capNext = false;
						continue;
					}
					const punct = revPunct[ch];
					if (punct !== undefined) {
						result += punct;
						capNext = false;
						continue;
					}

					result += '?';
					capNext = false;
				}
				return result;
			}

			function dotsToBraille(input) {
				const cells = [];
				const tokens = input.trim().split(/\s+/);
				for (let t = 0; t < tokens.length; t++) {
					const tok = tokens[t];
					if (!tok)
						continue;
					if (tok === '0' || tok === '_') {
						cells.push({
							braille: BLANK,
							source: '⎵',
							isSpace: true
						});
						continue;
					}
					const dotNums = [...tok].map(Number).filter(n=>n >= 1 && n <= 6);
					const unique = [...new Set(dotNums)].sort((a,b)=>a - b);
					const bChar = unique.length ? String.fromCharCode(0x2800 + unique.reduce((s,x)=>s + (1 << (x - 1)), 0)) : BLANK;
					cells.push({
						braille: bChar,
						source: unique.join('') || '?'
					});
				}
				return cells;
			}

			const cellsToUnicode = cells=>cells.map(c=>c.braille).join('');

			function cellsToDotsStr(cells) {
				return cells.map(c=>{
					if (c.isSpace)
						return '0';
					const dots = charToDots(c.braille);
					return dots.length ? dots.join('') : '0';
				}
				).join(' ');
			}

			const el = new Proxy({},{
				get: (_,id)=>document.getElementById(id)
			});

			class BrailleConverter {
				constructor() {
					this.uiLang = navigator.language?.startsWith('id') ? 'id' : 'en';
					this._setup();
					this._theme('auto');
					this._lang(this.uiLang);
				}

				_setup() {
					el.language.onchange = e=>this._lang(e.target.value);
					el.theme.onchange = e=>this._theme(e.target.value);
					el.clearBtn.onclick = ()=>this._clear();
					el.showVisual.onchange = ()=>this._toggleVisual();
					el.inputArea.addEventListener('input', ()=>{
						this._updateCaption();
						this._convert();
					});
					el.swapBtn.onclick = ()=>this._swap();
					document.querySelectorAll('input[name=dir]').forEach(r=>r.onchange = ()=>this._onDirChange());
					el.inputArea.addEventListener('keydown', e=>{
						if (e.key === 'Enter' && e.ctrlKey)
							this._convert();
					}
					);

					this._setupCopy('copyUnicode', 'unicodeOutput');
					this._setupCopy('copyDots', 'dotsOutput');
					this._setupCopy('copyText', 'textOutput');
				}

				_setupCopy(btnId, srcId) {
					document.getElementById(btnId).onclick = ()=>{
						const content = document.getElementById(srcId).textContent;
						navigator.clipboard?.writeText(content).then(()=>{
							const btn = document.getElementById(btnId);
							const orig = btn.textContent;
							btn.textContent = this._s('copiedBtn');
							setTimeout(()=>btn.textContent = orig, 1600);
						}
						);
					}
					;
				}

				_dir() {
					return document.querySelector('input[name=dir]:checked')?.value || 'tb';
				}

				_swap() {
					const cur = this._dir();
					if (cur === 'dots') return;
					const next = cur === 'tb' ? 'bt' : 'tb';
					document.getElementById('dir' + next.toUpperCase() + 'r').checked = true;
					this._onDirChange();
					this._convert();
				}
				_script() {
					return el.script.value;
				}
				_s(key) {
					return text[this.uiLang]?.[key] ?? text.en[key] ?? key;
				}

				_convert() {
					const dir = this._dir();
					const script = this._script();
					const input = el.inputArea.value;

					el.unicodeOutput.textContent = '';
					el.dotsOutput.textContent = '';
					el.textOutput.textContent = '';
					el.visualOutput.innerHTML = '';

					let cells = [];

					if (dir === 'tb') {
						cells = textToBraille(input, script);
						const uni = cellsToUnicode(cells);
						const dots = cellsToDotsStr(cells);
						el.unicodeOutput.textContent = uni || this._s('placeholder');
						el.dotsOutput.textContent = dots || this._s('placeholder');
						el.unicodeSection.style.display = '';
						el.dotsSection.style.display = '';
						el.textSection.style.display = 'none';

					} else if (dir === 'bt') {
						for (const ch of input) {
							if (ch === ' ')
								cells.push({
									braille: BLANK,
									source: ' ',
									isSpace: true
								});
							else if (ch >= '\u2800' && ch <= '\u28FF')
								cells.push({
									braille: ch,
									source: ch
								});
						}
						const decoded = brailleToText(input, script);
						el.textOutput.textContent = decoded || this._s('placeholder');
						el.unicodeSection.style.display = 'none';
						el.dotsSection.style.display = 'none';
						el.textSection.style.display = '';

					} else {
						cells = dotsToBraille(input);
						const uni = cellsToUnicode(cells);
						const decoded = brailleToText(uni, script);
						el.unicodeOutput.textContent = uni || this._s('placeholder');
						el.textOutput.textContent = decoded || this._s('placeholder');
						el.unicodeSection.style.display = '';
						el.dotsSection.style.display = 'none';
						el.textSection.style.display = '';
					}

					if (el.showVisual.checked)
						this._renderCells(cells);
				}

				_renderCells(cells) {
					const wrap = el.visualOutput;
					wrap.innerHTML = '';
					for (const cell of cells) {
						if (cell.isSpace) {
							const sp = document.createElement('div');
							sp.className = 'cell-spacer';
							wrap.appendChild(sp);
							continue;
						}
						const dots = charToDots(cell.braille);
						const item = document.createElement('div');
						item.className = 'cell-item';
						item.title = `dots: ${dots.length ? dots.join('-') : '(blank)'}\n${cell.source}`;

						const grid = document.createElement('div');
						grid.className = 'cell-grid';
						for (const pos of [1, 4, 2, 5, 3, 6]) {
							const dot = document.createElement('div');
							dot.className = 'cdot' + (dots.includes(pos) ? ' on' : '');
							grid.appendChild(dot);
						}

						const lbl = document.createElement('div');
						lbl.className = 'cell-lbl';
						lbl.textContent = cell.source || '';

						item.appendChild(grid);
						item.appendChild(lbl);
						wrap.appendChild(item);
					}
				}

				_toggleVisual() {
					el.visualOutput.style.display = el.showVisual.checked ? 'flex' : 'none';
				}

				_clear() {
					el.inputArea.value = '';
					el.unicodeOutput.textContent = '';
					el.dotsOutput.textContent = '';
					el.textOutput.textContent = '';
					el.visualOutput.innerHTML = '';
				}

				_onDirChange() {
					this._updateCaption();
					this._updateSectionVisibility();
				}

				_updateSectionVisibility() {
					const dir = this._dir();
					el.unicodeSection.style.display = (dir === 'bt') ? 'none' : '';
					el.dotsSection.style.display = (dir === 'bt' || dir === 'dots') ? 'none' : '';
					el.textSection.style.display = (dir === 'tb') ? 'none' : '';
				}

				_updateCaption() {
					const dir = this._dir();
					el.inputCaption.textContent = this._s('caption' + dir.toUpperCase().replace('DOTS', 'Dots').replace('TB', 'TB').replace('BT', 'BT'));
					const key = dir === 'tb' ? 'captionTB' : dir === 'bt' ? 'captionBT' : 'captionDots';
					el.inputCaption.textContent = this._s(key);
				}

				_theme(t) {
					document.documentElement.className = t === 'auto' ? '' : t;
					el.theme.value = t;
				}

				_lang(lang) {
					this.uiLang = el.language.value = document.documentElement.lang = lang;
					Object.keys(text.en).forEach(key=>{
						const node = document.getElementById(key);
						if (node)
							node.textContent = this._s(key);
					}
					);

					[...el.theme.options].forEach(opt=>opt.textContent = this._s(opt.value + 'Theme'));
					['copyUnicode', 'copyDots', 'copyText'].forEach(id=>{
						const b = document.getElementById(id);
						if (b)
							b.textContent = this._s('copyBtn');
					}
					);
					this._updateCaption();
					this._updateSectionVisibility();
				}
			}


			new BrailleConverter();
		</script>
	</body>
</html>
